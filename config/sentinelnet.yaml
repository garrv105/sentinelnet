# SentinelNet Configuration File
# ================================
# Copy this to your working directory and customize.

# --- Capture settings ---
interface: eth0          # Network interface (use 'lo' for loopback testing)
# pcap_file: capture.pcap  # Uncomment to replay from file instead
bpf_filter: ""           # BPF filter, e.g. "tcp port 80 or udp port 53"

# --- Flow settings ---
flow_timeout: 120.0      # Seconds of inactivity before a flow is finalized

# --- Detection settings ---
anomaly_threshold: 0.75  # 0.0-1.0 (higher = fewer alerts, lower = more sensitive)
rules_path: config/custom_rules.yaml  # Optional: path to custom YAML rules
model_path: models/isolation_forest.pkl  # Optional: persist trained model

# --- API server ---
api_enabled: false
api_host: "0.0.0.0"
api_port: 8000

# --- Response configuration ---
response:
  log_dir: logs/
  enable_ip_blocker: true
  dry_run: true                      # Set to false to apply actual firewall rules
  block_duration_secs: 3600          # 1 hour block TTL
  ip_whitelist:
    - "127.0.0.1"
    - "192.168.1.1"
    - "10.0.0.1"
  slack_webhook: ""                  # Optional: Slack webhook URL for alerts
  slack_rate_limit_secs: 60
